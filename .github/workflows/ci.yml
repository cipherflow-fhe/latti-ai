name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-12 \
            g++-12 \
            cmake \
            libhdf5-dev \
            libhdf5-cpp-103 \
            libomp-dev \
            libssl-dev \
            zlib1g-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r training/requirements.txt

      - name: Build (CPU mode)
        run: |
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Generate test data
        run: |
          cd build/inference/unittests
          python test_gen_layers.py TestLayerExport.test_sq

      - name: Run unit tests
        timeout-minutes: 30
        run: |
          cd build/inference/unittests
          ./test_data_structs
          ./test_fhe_layers_hetero "sq*"

      - name: Run compiler tests
        run: |
          python -m pytest training/model_compiler/unittests/test_compiler.py -v
  build-docker:
    runs-on: ubuntu-22.04
    needs: build-and-test
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: latti-ai:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image (CPU mode)
        timeout-minutes: 30
        run: |
          docker run --rm latti-ai:dev bash -c "
            cd /workspace/build
            cmake ..
            make -j\$(nproc)
            cd inference/unittests
            python test_gen_layers.py TestLayerExport.test_sq
            ./test_data_structs
            ./test_fhe_layers_hetero 'sq*'
            cd /workspace
            python -m pytest training/model_compiler/unittests/test_compiler.py -v
          "

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
